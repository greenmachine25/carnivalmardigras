<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mardi Gras Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="data:application/manifest+json,{'name':'Mardi Gras Nav','short_name':'MardiGras','start_url':'.','display':'standalone','background_color':'#0f172a','theme_color':'#0f172a'}">
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script type="module" src="./App.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Offline Ready'))
            .catch(err => console.log('Offline Setup Failed', err));
        });
      }
    </script>
</body>
</html>
